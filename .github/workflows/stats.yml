name: Generate stats card

on:
    schedule: # execute every 12 hours
        - cron: "* */12 * * *"

    workflow_dispatch:

    push:
        branches:
            - main

jobs:
    generate:
        permissions:
            contents: write
        runs-on: ubuntu-latest
        timeout-minutes: 5

        steps:
            - name: generate stats.svg
              uses: readme-tools/github-readme-stats-action@v1
              with:
                  card: stats
                  options: username=${{ github.repository_owner }}&card_width=520&custom_title=Estad%C3%ADsticas%20en%20GitHub%20de%20Hoshi&hide_title=false&hide_rank=false&show_icons=true&include_all_commits=true&count_private=true&disable_animations=false&theme=transparent&locale=es&hide_border=true
                  path: dist/stats.svg
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: push stats.svg to the output branch
              uses: crazy-max/ghaction-github-pages@v3.1.0
              with:
                  target_branch: stats-output
                  build_dir: dist
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
